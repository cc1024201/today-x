<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Today-X</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }
    header {
      padding: 48px 24px 32px;
      text-align: center;
    }
    header h1 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 900;
      letter-spacing: -1px;
      color: #fff;
    }
    header p {
      margin-top: 8px;
      font-size: 14px;
      color: #666;
      letter-spacing: 1px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 24px 64px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
      display: block;
    }
    .card:hover {
      border-color: #555;
      transform: translateY(-2px);
    }
    .card-emoji { font-size: 40px; line-height: 1; }
    .card-title {
      margin-top: 14px;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .card-desc {
      margin-top: 6px;
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }
    .card-date {
      margin-top: 16px;
      font-size: 11px;
      color: #444;
      letter-spacing: 0.5px;
    }
    .card-tag {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: #2a2a2a;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>Today-X</h1>
    <p>ONE THING · EVERY DAY</p>
  </header>

  <div class="grid">
    <a class="card" href="brush-master/">
      <div class="card-emoji">🐱</div>
      <div class="card-title">刷猫高手</div>
      <div class="card-desc">反应游戏 — 背对时刷毛得分，转头立刻松手。支持 4 套皮肤与连击倍率。</div>
      <div class="card-tag">游戏</div>
      <div class="card-date">2026-04-26</div>
    </a>

    <a class="card" href="ai-or-human/">
      <div class="card-emoji">🤖</div>
      <div class="card-title">AI 还是人？</div>
      <div class="card-desc">Turing Test 答题游戏 — 判断这段文字是 AI 写的还是人类写的，追最高连击。</div>
      <div class="card-tag">游戏</div>
      <div class="card-date">2026-04-26</div>
    </a>
  </div>
</body>
</html>
