<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AI 还是人？</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --card-bg: #1e1e1e;
      --card-border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #666;
      --correct: #22c55e;
      --wrong: #ef4444;
      --ai-btn: #6366f1;
      --human-btn: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'SimHei', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100dvh;
      position: relative;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 20px;
    }
    .screen.hidden { display: none; }

    /* ── MENU ── */
    #menu-title {
      font-size: clamp(32px, 10vw, 52px);
      font-weight: 900;
      letter-spacing: -1px;
      text-align: center;
    }
    #menu-subtitle {
      font-size: 15px;
      color: var(--muted);
      text-align: center;
    }
    #menu-best {
      font-size: 14px;
      color: var(--muted);
    }

    /* ── BUTTONS ── */
    .btn {
      border: none; cursor: pointer; border-radius: 14px;
      font-size: 16px; font-weight: 700;
      padding: 14px 32px; transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: var(--text); color: var(--bg);
      width: 100%; max-width: 280px;
    }

    /* ── PLAYING ── */
    #hud {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 700;
    }
    #streak-display { color: var(--text); font-size: 18px; }
    #best-display { color: var(--muted); }

    #card-wrapper {
      width: 100%;
      perspective: 800px;
    }

    #card {
      width: 100%;
      height: 220px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #card.flipped { transform: rotateY(180deg); }
    #card.no-transition { transition: none; }

    #card-front, #card-back {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      padding: 28px 24px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #card-front {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      font-size: 17px;
      line-height: 1.75;
    }
    #card-front.correct { background: #14532d; border-color: var(--correct); }
    #card-front.wrong   { background: #450a0a; border-color: var(--wrong); }

    #card-back {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      transform: rotateY(180deg);
      gap: 14px;
    }
    #answer-label {
      font-size: 20px;
      font-weight: 900;
    }
    #hint-text {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
    }

    #btn-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .answer-btn {
      border: none; cursor: pointer; border-radius: 14px;
      font-size: 15px; font-weight: 700; padding: 16px 8px;
      transition: transform 0.1s, opacity 0.1s;
      color: #fff;
    }
    .answer-btn:not(:disabled):active { transform: scale(0.96); }
    .answer-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    #btn-ai    { background: var(--ai-btn); }
    #btn-human { background: var(--human-btn); }

    /* ── ANIMATIONS ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    #streak-display.shake { animation: shake 0.35s ease; }

    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #card-wrapper.slide-in { animation: slideInUp 0.3s ease; }
  </style>
</head>
<body>
  <div id="app">

    <!-- MENU -->
    <div id="screen-menu" class="screen">
      <div id="menu-title">AI 还是人？</div>
      <div id="menu-subtitle">你能分清吗？</div>
      <div id="menu-best"></div>
      <button id="btn-start" class="btn btn-primary">开始挑战</button>
    </div>

    <!-- PLAYING -->
    <div id="screen-playing" class="screen hidden">
      <div id="hud">
        <div id="streak-display">🔥 ×<span id="streak-num">0</span></div>
        <div id="best-display">最高 <span id="best-num">0</span></div>
      </div>

      <div id="card-wrapper">
        <div id="card">
          <div id="card-front">
            <p id="question-text"></p>
          </div>
          <div id="card-back">
            <div id="answer-label"></div>
            <p id="hint-text"></p>
          </div>
        </div>
      </div>

      <div id="btn-row">
        <button id="btn-ai" class="answer-btn">🤖 AI 写的</button>
        <button id="btn-human" class="answer-btn">👤 人类写的</button>
      </div>
    </div>

  </div>
  <script>
    // JS goes here in later tasks
  </script>
</body>
</html>
